name: Deploy PURE AI to GitHub Pages

on:
  push:
    branches: ["main"] # سيتم التحديث كلما رفعت كود على فرع main
  workflow_dispatch: # يتيح لك تشغيل التجميع يدوياً

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # سيتم تجميع كل الملفات الموجودة في المستودع

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
