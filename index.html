<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PURE AI - Windows 7 Version</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { text-align: center; padding: 15px; border-bottom: 2px solid #00d2ff; background: #1e1e1e; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .bubble { margin-bottom: 15px; padding: 12px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { background: #0072ff; align-self: flex-start; }
        .ai { background: #333; align-self: flex-end; border: 1px solid #444; }
        .input-area { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #252525; color: white; }
        button { background: #00d2ff; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>PURE AI</h1></header>
<div id="chat-window"></div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
    <button onclick="startChat()">إرسال</button>
</div>

<!-- استدعاء المكتبة بطريقة تقليدية جداً تناسب المتصفحات القديمة -->
<script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run"
  }
}
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyAXqRXuwz1rDUhbyIIjCu9JTiOW3Ub_rJA";
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.startChat = async function() {
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const text = input.value.trim();

        if (!text) return;

        // إضافة رسالة المستخدم
        chatWindow.innerHTML += <div class="bubble user">${text}</div>;
        input.value = '';

        // إضافة مكان رد الذكاء الاصطناعي
        const tempId = 'ai-' + Date.now();
        chatWindow.innerHTML += <div class="bubble ai" id="${tempId}">جاري التحميل...</div>;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(text);
            const response = await result.response;
            document.getElementById(tempId).innerText = response.text();
        } catch (e) {
            document.getElementById(tempId).innerHTML = "خطأ: " + e.message;
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
