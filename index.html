<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PURE AI - Stable Edition</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e1e1e; padding: 15px; text-align: center; border-bottom: 2px solid #00d2ff; }
        header h1 { margin: 0; color: #00d2ff; font-size: 24px; text-shadow: 0 0 10px #00d2ff; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 85%; line-height: 1.6; word-wrap: break-word; }
        .user { background: #0072ff; color: white; align-self: flex-start; }
        .ai { background: #252525; border: 1px solid #444; align-self: flex-end; }
        .input-area { background: #1a1a1a; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { background: #00d2ff; color: black; border: none; padding: 0 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0099cc; }
    </style>
</head>
<body>

<header><h1>PURE AI</h1></header>

<div id="chat-window">
    <div class="msg ai">مرحباً بك! أنا PURE AI، كيف يمكنني مساعدتك اليوم؟</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
    <button id="send-btn" onclick="askAI()">إرسال</button>
</div>

<!-- 1. تغيير رابط المكتبة لنسخة أكثر استقراراً وتوافقاً -->
<script src="https://unpkg.com"></script>

<script>
    function askAI() {
        var input = document.getElementById('user-input');
        var chat = document.getElementById('chat-window');
        var text = input.value.trim();

        if (text === "") return;

        var userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.innerHTML = '<b>أنت:</b> ' + text;
        chat.appendChild(userDiv);

        var aiDiv = document.createElement('div');
        aiDiv.className = 'msg ai';
        aiDiv.innerText = 'جاري التفكير...';
        chat.appendChild(aiDiv);

        input.value = ""; 
        chat.scrollTop = chat.scrollHeight;

        try {
            // 2. التأكد من أن المكتبة محملة قبل الاستخدام
            if (!window.GoogleGenerativeAI) {
                throw new Error("لم يتم تحميل مكتبة الذكاء الاصطناعي بعد، يرجى تحديث الصفحة.");
            }

            var API_KEY = "AIzaSyAXqRXuwz1rDUhbyIIjCu9JTiOW3Ub_rJA";
            var genAI = new window.GoogleGenerativeAI.GoogleGenerativeAI(API_KEY);
            var model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            model.generateContent(text).then(function(result) {
                return result.response;
            }).then(function(response) {
                aiDiv.innerText = "PURE AI: " + response.text();
                chat.scrollTop = chat.scrollHeight;
            }).catch(function(err) {
                aiDiv.style.color = "red";
                aiDiv.innerText = "خطأ في الاتصال: " + err.message;
            });

        } catch (e) {
            aiDiv.style.color = "red";
            aiDiv.innerText = "تنبيه: " + e.message;
        }
    }

    document.getElementById('user-input').onkeypress = function(e) {
        if ((e.keyCode || e.which) == 13) { askAI(); return false; }
    }
</script>

</body>
</html>
