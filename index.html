<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURE AI</title>
    <style>
        :root { --primary: #00d2ff; --bg: #121212; --chat: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { text-align: center; padding: 15px; border-bottom: 2px solid var(--primary); background: var(--chat); position: sticky; top: 0; }
        header h1 { margin: 0; font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 8px var(--primary); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { background: linear-gradient(135deg, #0072ff, #00c6ff); align-self: flex-start; }
        .ai { background: var(--chat); align-self: flex-end; border: 1px solid #333; }
        .input-area { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #252525; color: white; outline: none; }
        button { background: var(--primary); color: black; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>PURE AI</h1></header>
<div id="chat-window"></div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
    <button id="send-btn">إرسال</button>
</div>

<!-- استدعاء المكتبة بطريقة متوافقة أكثر -->
<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // استبدل هذا المفتاح بمفتاحك الجديد فوراً
    const API_KEY = "AIzaSyAXqRXuwz1rDUhbyIIjCu9JTiOW3Ub_rJA"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    const sendBtn = document.getElementById('send-btn');
    const input = document.getElementById('user-input');
    const chatWindow = document.getElementById('chat-window');

    async function handleChat() {
        const text = input.value.trim();
        if (!text) return;

        chatWindow.innerHTML += <div class="bubble user">${text}</div>;
        input.value = '';

        const tempId = 'ai-' + Date.now();
        chatWindow.innerHTML += <div class="bubble ai" id="${tempId}">جاري التفكير...</div>;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(text);
            const response = await result.response;
            document.getElementById(tempId).innerText = response.text();
        } catch (error) {
            document.getElementById(tempId).innerHTML = <span style="color:red">خطأ: ${error.message}</span>;
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ربط الزر بالدالة برمجياً لتجنب خطأ Not Defined
    sendBtn.addEventListener('click', handleChat);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
</script>

</body>
</html>
