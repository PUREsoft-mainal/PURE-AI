<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PURE AI - Windows 7</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        #chat-window { height: 400px; overflow-y: auto; border: 2px solid #00d2ff; background: #1e1e1e; padding: 15px; margin-bottom: 10px; text-align: right; border-radius: 10px; }
        .input-area { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #252525; color: white; }
        button { padding: 10px 25px; background: #00d2ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: black; }
        .user-msg { color: #00d2ff; margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .ai-msg { color: #00ff88; margin-bottom: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1 style="color:#00d2ff;">PURE AI</h1>
    
    <div id="chat-window">
        <div class="ai-msg">مرحباً بك! أنا PURE AI، كيف يمكنني مساعدتك اليوم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
        <button id="send-btn">إرسال</button>
    </div>

    <!-- استدعاء المكتبة أولاً -->
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- استدعاء ملف البرمجة الخاص بك ثانياً -->
    <script src="script.js"></script>

</body>
</html>
